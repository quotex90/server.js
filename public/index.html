<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      text-align:center;
      margin:0;
      padding:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      margin:20px;
      border-radius:15px;
    }

    button{
      width:90%;
      padding:15px;
      margin:10px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-size:18px;
    }
  </style>
</head>

<body>

<h1>Quotex USA</h1>

<div class="card">
  <h2>Live Balance</h2>
  <h1>$0.00</h1>
</div>

<div class="card">
  <h2>Demo Balance</h2>
  <h1>$10,000</h1>
</div>

<button>Deposit</button>
<button>Withdrawal</button>
<button>Trading Market</button>
<button>Watch Ads</button>

</body>
</html>
