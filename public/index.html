<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quotex USA</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .header{
      padding:20px;
      background:#111827;
      font-size:24px;
      font-weight:bold;
    }

    .card{
      background:#1e293b;
      margin:15px;
      padding:20px;
      border-radius:15px;
    }

    .balance{
      font-size:32px;
      color:#22c55e;
    }

    button{
      width:90%;
      padding:15px;
      margin:10px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-size:18px;
    }
  </style>
</head>
<body>

<div class="header">
  Quotex USA
</div>

<div class="card">
  <h2>Live Balance</h2>
  <div class="balance">$0.00</div>
</div>

<div class="card">
  <h2>Demo Balance</h2>
  <div class="balance">$10,000</div>
</div>

<button>Deposit</button>
<button>Withdrawal</button>
<button>Trading Market</button>
<button>Watch Ads</button>
<button>Invite & Earn</button>

</body>
</html>
