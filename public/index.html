<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quotex USA</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    .header{
      text-align:center;
      font-size:30px;
      font-weight:bold;
      margin-bottom:20px;
      color:#22c55e;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      text-align:center;
    }

    .balance{
      font-size:32px;
      color:#22c55e;
      margin-top:10px;
    }

    .uid{
      margin-top:10px;
      color:#94a3b8;
    }

    .btn{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      background:#16a34a;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    .btn:hover{
      background:#15803d;
    }

    .menu{
      margin-top:20px;
    }
  </style>
</head>

<body>

  <div class="header">
    Quotex USA
  </div>

  <div class="card">
    <h2>Live Balance</h2>
    <div class="balance">$0.00</div>
    <div class="uid">UID: QTX928173</div>
  </div>

  <div class="card">
    <h2>Demo Balance</h2>
    <div class="balance">$10,000</div>
  </div>

  <div class="menu">

    <button class="btn">
      Deposit
    </button>

    <button class="btn">
      Withdrawal
    </button>

    <button class="btn">
      Trading Market
    </button>

    <button class="btn">
      Watch Ads
    </button>

    <button class="btn">
      Invite & Earn
    </button>

    <button class="btn">
      Customer Support
    </button>

  </div>

</body>
</html>
